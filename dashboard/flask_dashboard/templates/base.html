<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SDN Hybrid Cloud Dashboard</title><link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}"></head><body><div class="layout"><aside class="sidebar"><div class="brand">SDN Hybrid Cloud</div><nav><a href="{{ url_for('overview') }}">Overview</a><a href="{{ url_for('openstack_page') }}">OpenStack</a><a href="{{ url_for('testing_page') }}">Testing & Evaluation</a></nav></aside><main class="content">{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="flash-wrap">{% for category, message in messages %}<div class="flash {{category}}">{{ message }}</div>{% endfor %}</div>{% endif %}{% endwith %}{% block content %}{% endblock %}</main></div><script src="{{ url_for('static', filename='dashboard.js') }}"></script></body></html>
